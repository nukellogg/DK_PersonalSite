name: Update World Cup rankings daily

on:
  schedule:
    # Midnight US Eastern (4 AM or 5 AM UTC depending on DST)
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch live results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          set -e
          cd pipeline
          python fetch_results.py
          echo "--- results.json ---"
          cat ../data/results.json | head -30

      - name: Fetch Elo ratings
        run: |
          set -e
          cd pipeline
          python fetch_elo.py

      - name: Run model
        run: |
          set -e
          cd pipeline
          python model.py
          echo "--- rankings.json generated ---"
          python -c "import json; d=json.load(open('../web/rankings.json')); print('Generated:', d['meta']['generated']); t=d['teams'][0]; print('Top team:', t['name'], 'depth:', t['reached_depth'], 'elim:', t['eliminated'])"

      - name: Copy rankings to live site
        run: cp web/rankings.json worldcup/rankings.json

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add worldcup/rankings.json data/results.json data/elo.csv
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Auto-update World Cup rankings $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Azure Login
        if: steps.commit.outputs.pushed == 'true'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.WWWDK_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.WWWDK_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.WWWDK_AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.WWWDK_AZURE_CLIENT_SECRET }}

      - name: Deploy to Azure Container Apps
        if: steps.commit.outputs.pushed == 'true'
        run: |
          az acr login --name ksmacr
          docker build --no-cache -t ksmacr.azurecr.io/wwwdeankarlancom:${{ github.sha }} ./
          docker push ksmacr.azurecr.io/wwwdeankarlancom:${{ github.sha }}
          az containerapp update \
            --name wwwdeankarlancom \
            --resource-group KSM_Teaching_RG \
            --image ksmacr.azurecr.io/wwwdeankarlancom:${{ github.sha }}
