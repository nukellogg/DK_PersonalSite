server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly (images, css, js, etc.)
    location /images/ {
        try_files $uri =404;
    }

    # World Cup guide served as standalone static files
    location /worldcup/ {
        try_files $uri $uri/ =404;
    }

    # All other paths serve index.html (SPA routing)
    location / {
        try_files $uri /index.html;
    }
}
